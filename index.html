<style>
  :root {
    --color-primary:        #ff0086;
    --color-primary-hover:  #ff009a;
    --color-primary-active: #fa0082;
    --color-primary-bg:     rgba(255, 0, 157, 0.04);
    --color-primary-soft:   #fff5fb;
    --tag-gradient-start: #ffb799;
    --tag-gradient-end:   #ff44a5;
    --text-primary:   #000000;
    --text-regular:   #303133;
    --text-secondary: #606266;
    --text-placeholder: #a8abb2;
    --text-muted:     #999999;
    --text-disabled:  #b7b7b7;
    --text-link:      var(--color-primary);
    --bg-page:         #f2f3f5;
    --bg-page-rsf:     #f5f5f7;
    --bg-content:      #ece8f6;
    --bg-content-soft: #f1eef9;
    --bg-card:         #ffffff;
    --bg-hover:        #f7f8fa;
    --bg-stripe:       #fafafa;
    --border-base:  #dcdfe6;
    --border-light: #e4e7ed;
    --border-lighter:#ebeef5;
    --border-extra-light: #f2f6fc;
    --divider: #ededf2;
    --text-gold: #ad7833;
    --bg-tag:    #fff3df;
    --radius-xs: 2px;
    --radius-sm: 4px;
    --radius-md: 10px;
    --radius-lg: 15px;
    --radius-xl: 16px;
    --radius-2xl: 24px;
    --radius-pill: 999px;
    --radius-circle: 50%;
    --shadow-none:  none;
    --shadow-soft:  0 1px 2px rgba(20, 20, 40, 0.03);
    --shadow-hover: 0 6px 18px rgba(255, 0, 134, 0.12);
    --shadow-light: 0 0 12px rgba(0, 0, 0, 0.06);
  }

  .hh-wrap {
    height: calc(100vh - 100px);
    overflow: hidden auto;
    padding-right: 4px;
    min-width: 1100px;
    font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-regular);
  }

  .hh-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .hh-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .hh-sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 269px);
    grid-row-gap: 20px;
    grid-column-gap: 20px;
    place-content: flex-start;
  }

  .card {
    width: 270px;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-light);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }

  .card__cover-wrap {
    position: relative;
    width: 100%;
    height: 180px;
  }

  .card__cover {
    width: 100%;
    height: 100%;
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    object-fit: cover;
    display: block;
  }

  .tag-corner {
    position: absolute;
    top: 0;
    left: 0;
    height: 26px;
    padding: 0 14px;
    font-size: 12px;
    color: #fff;
    background: linear-gradient(90deg, var(--tag-gradient-start) 0%, var(--tag-gradient-end) 100%);
    border-radius: var(--radius-xl) 0;
    display: inline-flex;
    align-items: center;
    font-weight: 500;
  }

  .card__content {
    padding: 16px 12px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card__title {
    font-size: 16px;
    font-weight: 550;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .card__shop {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card__price-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-top: 4px;
  }

  .card__price-symbol {
    font-size: 14px;
    color: var(--color-primary);
    font-weight: 600;
  }

  .card__price {
    font-size: 20px;
    font-weight: 600;
    color: var(--color-primary);
  }

  .card__stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border-lighter);
    padding-top: 12px;
    margin-top: 8px;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-val {
    color: var(--text-regular);
    font-weight: 500;
  }
</style>
